name: "Build for macOS"

on:
  workflow_dispatch:
    inputs:
      os:
        required: true
        description: Build target OS
        default: "macos-aarch64"
        type: choice
        options:
          - "macos-x86_64"
          - "macos-aarch64"
      php-version:
        required: true
        description: PHP version to compile
        default: "8.5"
        type: choice
        options:
          - "8.5"
          - "8.4"
          - "8.3"
      extensions:
        description: Extensions to build (comma separated)
        required: true
        type: string
        default: "webview"
      extra-libs:
        description: Extra libraries to build (optional, comma separated)
        type: string
      build-cli:
        description: Build for php cli binary
        default: true
        type: boolean
      build-micro:
        description: Build for php micro binary
        default: true
        type: boolean
      enable-zts:
        description: Enable ZTS
        type: boolean
        default: false
      debug:
        description: Display full build logs
        type: boolean
        default: true
      no-strip:
        description: Keep debug symbols for debugging
        type: boolean
        default: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: "Build PHP ${{ inputs.php-version }} for ${{ inputs.os }}"
    runs-on: ${{ inputs.os == 'macos-x86_64' && 'macos-15-intel' || 'macos-15' }}
    timeout-minutes: 240
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: pecl
          extensions: curl, openssl, mbstring
          ini-values: memory_limit=-1

      - name: "Clone static-php-cli"
        run: |
          git clone --depth 1 https://github.com/crazywhalecc/static-php-cli.git
          cd static-php-cli
          composer install --no-dev --no-interaction --prefer-dist

      - name: "Configure StaticPHP v3"
        working-directory: static-php-cli
        run: |
          SAPI=""
          if [ "${{ inputs.build-cli }}" = "true" ]; then
            SAPI="${SAPI:+$SAPI,}cli"
          fi
          if [ "${{ inputs.build-micro }}" = "true" ]; then
            SAPI="${SAPI:+$SAPI,}micro"
          fi
          if [ -z "$SAPI" ]; then
            echo "At least one SAPI must be enabled" >&2
            exit 1
          fi
          ../scripts/configure-spc-v3-webview.sh
          ../scripts/configure-spc-v3-craft.sh \
            --php-version "${{ inputs.php-version }}" \
            --extensions "${{ inputs.extensions }}" \
            --packages "${{ inputs.extra-libs }}" \
            --sapi "${SAPI}" \
            --debug "${{ inputs.debug }}" \
            --no-strip "${{ inputs.no-strip }}" \
            --enable-zts "${{ inputs.enable-zts }}"

      - name: "Generate cache key"
        run: echo "EXTENSIONS_KEY=$(echo '${{ inputs.extensions }}' | tr ',' '-')" >> "$GITHUB_ENV"

      - id: cache-download
        name: "Cache downloaded source"
        uses: actions/cache@v4
        with:
          path: static-php-cli/downloads
          key: php-dependencies-v3-${{ inputs.os }}-${{ inputs.php-version }}-${{ env.EXTENSIONS_KEY }}

      - name: "Craft build"
        working-directory: static-php-cli
        run: ./bin/spc craft craft.yml

      - if: ${{ inputs.build-cli == true }}
        name: "Upload PHP cli SAPI"
        uses: actions/upload-artifact@v4
        with:
          name: php-cli-${{ inputs.php-version }}-${{ inputs.os }}
          path: static-php-cli/buildroot/bin/php

      - if: ${{ inputs.build-micro == true }}
        name: "Upload PHP micro SAPI"
        uses: actions/upload-artifact@v4
        with:
          name: php-micro-${{ inputs.php-version }}-${{ inputs.os }}
          path: static-php-cli/buildroot/bin/micro.sfx

      - uses: actions/upload-artifact@v4
        name: "Upload License files"
        with:
          name: license-files-${{ inputs.php-version }}-${{ inputs.os }}
          path: static-php-cli/buildroot/license/

      - uses: actions/upload-artifact@v4
        name: "Upload Build metadata"
        with:
          name: build-meta-${{ inputs.php-version }}-${{ inputs.os }}
          path: static-php-cli/buildroot/.build.json
