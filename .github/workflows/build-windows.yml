name: Build for Windows

on:
  workflow_dispatch:
    inputs:
      php-version:
        required: true
        description: PHP version to compile
        default: "8.5"
        type: choice
        options:
          - "8.5"
          - "8.4"
          - "8.3"
      build-cli:
        description: Build php cli binary
        default: true
        type: boolean
      build-micro:
        description: Build php micro binary
        default: true
        type: boolean
      enable-micro-win32:
        description: Enable php micro win32
        default: true
        type: boolean
      enable-zts:
        description: Enable ZTS
        type: boolean
        default: false
      extensions:
        description: Extensions to compile (comma separated)
        required: true
        type: string
        default: "webview"
      extra-libs:
        description: Extra libraries to build (optional, comma separated)
        type: string
      # prefer-pre-built:
      #   description: Prefer pre-built binaries (reduce build time)
      #   type: boolean
      #   default: true
      debug:
        description: Display full build logs
        type: boolean
        default: true
      with-upx-pack:
        description: Pack with UPX
        type: boolean
        default: true
      no-strip:
        description: Keep debug symbols for debugging
        type: boolean
        default: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build PHP ${{ inputs.php-version }} for Windows x86_64
    runs-on: windows-2022
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: pecl
          extensions: curl, openssl, mbstring
          ini-values: memory_limit=-1

      - name: "Clone static-php-cli"
        run: |
          git clone --depth 1 https://github.com/crazywhalecc/static-php-cli.git
          cd static-php-cli
          composer install --no-dev --no-interaction --prefer-dist

      - name: "Configure StaticPHP v3"
        shell: bash
        working-directory: static-php-cli
        run: |
          SAPI=""
          if [ "${{ inputs.build-cli }}" = "true" ]; then
            SAPI="${SAPI:+$SAPI,}cli"
          fi
          if [ "${{ inputs.build-micro }}" = "true" ]; then
            SAPI="${SAPI:+$SAPI,}micro"
          fi
          if [ -z "$SAPI" ]; then
            echo "At least one SAPI must be enabled" >&2
            exit 1
          fi
          ../scripts/configure-spc-v3-webview.sh
          ../scripts/configure-spc-v3-craft.sh \
            --php-version "${{ inputs.php-version }}" \
            --extensions "${{ inputs.extensions }}" \
            --packages "${{ inputs.extra-libs }}" \
            --sapi "${SAPI}" \
            --debug "${{ inputs.debug }}" \
            --no-strip "${{ inputs.no-strip }}" \
            --enable-zts "${{ inputs.enable-zts }}" \
            --enable-micro-win32 "${{ inputs.enable-micro-win32 }}" \
            --with-upx-pack "${{ inputs.with-upx-pack }}" \
            --download-parallel 1

      - name: "Generate cache key"
        shell: bash
        run: echo "EXTENSIONS_KEY=$(echo '${{ inputs.extensions }}' | tr ',' '-')" >> "$GITHUB_ENV"

      # Cache downloaded source
      - id: cache-download
        name: "Cache downloaded source"
        uses: actions/cache@v4
        with:
          path: static-php-cli/downloads
          key: php-dependencies-v3-windows-${{ inputs.php-version }}-${{ env.EXTENSIONS_KEY }}

      - name: "Autofix build environment"
        working-directory: static-php-cli
        run: ./bin/spc doctor --auto-fix

      - name: "Craft build"
        working-directory: static-php-cli
        run: ./bin/spc craft craft.yml

      - if: ${{ inputs.build-cli == true }}
        name: "Upload PHP cli executable"
        uses: actions/upload-artifact@v4
        with:
          name: php-cli-${{ inputs.php-version }}-windows
          path: static-php-cli/buildroot/bin/php.exe

      - if: ${{ inputs.build-micro == true }}
        name: "Upload PHP micro executable"
        uses: actions/upload-artifact@v4
        with:
          name: php-micro-${{ inputs.php-version }}-windows
          path: static-php-cli/buildroot/bin/micro.sfx

      - uses: actions/upload-artifact@v4
        name: "Upload License files"
        with:
          name: license-files-${{ inputs.php-version }}-windows
          path: static-php-cli/buildroot/license/

      - uses: actions/upload-artifact@v4
        name: "Upload Build metadata"
        with:
          name: build-meta-${{ inputs.php-version }}-windows
          path: static-php-cli/buildroot/.build.json
