name: "Build PHP CLI/Micro for All Platforms"

on:
  workflow_dispatch:
    inputs:
      php-version:
        required: true
        description: PHP version to compile
        default: "8.5"
        type: choice
        options:
          - "8.5"
          - "8.4"
          - "8.3"
  push:
    tags:
      - "*"

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: "PHP ${{inputs.php-version}} (${{ matrix.os }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x86_64
            runs-on: ubuntu-22.04
            os_family: linux
            upx: true
            extensions: "webview,bz2,ctype,curl,dom,ffi,filter,iconv,mbstring,zlib,openssl,phar,sockets,swow,tokenizer,xml,xmlreader,xmlwriter,zip"
          - os: linux-aarch64
            runs-on: ubuntu-22.04-arm
            os_family: linux
            upx: true
            extensions: "webview,bz2,ctype,curl,dom,ffi,filter,iconv,mbstring,zlib,openssl,phar,sockets,swow,tokenizer,xml,xmlreader,xmlwriter,zip"
          - os: macos-x86_64
            runs-on: macos-15-intel
            os_family: macos
            upx: false
            extensions: "webview,zlib,openssl,curl,swow,ctype,dom,filter,iconv,xml,xmlreader,xmlwriter,mbstring,pcntl,phar,posix,sockets,tokenizer,zip"
          - os: macos-aarch64
            runs-on: macos-15
            os_family: macos
            upx: false
            extensions: "webview,zlib,openssl,curl,swow,ctype,dom,filter,iconv,xml,xmlreader,xmlwriter,mbstring,pcntl,phar,posix,sockets,tokenizer,zip"
          - os: windows-x86_64
            runs-on: windows-2022
            os_family: windows
            micro_win32: false
            upx: true
            extensions: "webview,bz2,ctype,zlib,openssl,curl,iconv,xml,dom,ffi,filter,mbstring,phar,sockets,swow,tokenizer,xmlreader,xmlwriter,zip"
          - os: windows-x86_64-no-console
            runs-on: windows-2022
            os_family: windows
            micro_win32: true
            upx: true
            extensions: "webview,bz2,ctype,zlib,openssl,curl,iconv,xml,dom,ffi,filter,mbstring,phar,sockets,swow,tokenizer,xmlreader,xmlwriter,zip"
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: pecl
          extensions: curl, openssl, mbstring
          ini-values: memory_limit=-1

      - name: "Set build parameters"
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "PHP_VERSION=${{ inputs.php-version }}" >> $GITHUB_ENV
          else
            echo "PHP_VERSION=8.5" >> $GITHUB_ENV
          fi
          echo "EXTENSIONS=${{ matrix.extensions }}" >> $GITHUB_ENV
          echo "DEBUG=false" >> $GITHUB_ENV

      - name: "Clone static-php-cli"
        run: |
          git clone https://github.com/crazywhalecc/static-php-cli.git
          cd static-php-cli
          composer update --no-dev --no-interaction

      - name: "Configure webview extension"
        working-directory: static-php-cli
        shell: bash
        run: |
          if [ ! -f config/ext.json ]; then
            echo '{}' > config/ext.json
          fi
          cat config/ext.json | jq '. + {
            "webview": {
              "type": "external",
              "source": "webview",
              "frameworks": ["WebKit"],
              "cpp-extension": true
            }
          }' > config/ext.json.tmp && mv config/ext.json.tmp config/ext.json

          if [ ! -f config/source.json ]; then
            echo '{}' > config/source.json
          fi

          CURRENT_REF="${{ github.ref_name }}"
          cat config/source.json | jq --arg ref "$CURRENT_REF" '. + {
            "webview": {
              "type": "git",
              "path": "php-src/ext/webview",
              "rev": $ref,
              "url": "https://github.com/happystraw/php-ext-webview",
              "license": {
                "type": "file",
                "path": "LICENSE"
              }
            }
          }' > config/source.json.tmp && mv config/source.json.tmp config/source.json

      - name: "Generate cache key"
        shell: bash
        run: echo "EXTENSIONS_KEY=$(echo '${{ env.EXTENSIONS }}' | tr ',' '-')" >> "$GITHUB_ENV"

      - id: cache-download
        name: "Cache downloaded source"
        uses: actions/cache@v4
        with:
          path: static-php-cli/downloads
          key: php-dependencies-${{ matrix.os_family }}-${{ env.PHP_VERSION }}-${{ env.EXTENSIONS_KEY }}

      - name: "Setup (Linux)"
        if: matrix.os_family == 'linux'
        working-directory: static-php-cli
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

          EXT_WEBVIEW_DEPS_PC_DIR="$(pwd)/ext_webview_deps_pc_dir"
          ../scripts/copy-pkgconfig.sh --dir "${EXT_WEBVIEW_DEPS_PC_DIR}"

          echo "SPC_TARGET=native-native" >> $GITHUB_ENV

          if [[ "${{ env.EXTENSIONS }}" == *"webview"* ]]; then
            echo "SPC_EXTRA_LIBS=$(pkg-config --libs gtk+-3.0 webkit2gtk-4.1)" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=${EXT_WEBVIEW_DEPS_PC_DIR}" >> $GITHUB_ENV
          fi

          ./bin/spc install-pkg zig

      - name: "Run doctor"
        shell: bash
        working-directory: static-php-cli
        run: |
          FIX_CMD="./bin/spc doctor --auto-fix"
          if [ "${{ env.DEBUG }}" == "true" ]; then
            FIX_CMD="$FIX_CMD --debug"
          fi
          eval "$FIX_CMD"

      - name: "Download sources"
        shell: bash
        working-directory: static-php-cli
        run: |
          DOWN_CMD="./bin/spc download --with-php=${{ env.PHP_VERSION }} --for-extensions=${{ env.EXTENSIONS }} --prefer-pre-built"
          if [ "${{ matrix.os_family }}" != "windows" ]; then
            DOWN_CMD="$DOWN_CMD --ignore-cache-sources=php-src"
          fi
          if [ "${{ env.DEBUG }}" == "true" ]; then
            DOWN_CMD="$DOWN_CMD --debug"
          fi
          eval "$DOWN_CMD"
          if [ "${{ matrix.upx }}" == "true" ]; then
            ./bin/spc install-pkg upx
          fi

      - name: "Build zlib (Linux)"
        if: matrix.os_family == 'linux'
        working-directory: static-php-cli
        run: |
          ./bin/spc download zlib --for-libs=zlib
          ./bin/spc build:libs zlib -r

      - name: "Set build flags"
        shell: bash
        run: |
          FLAGS="--build-micro"
          if [ "${{ matrix.micro_win32 }}" == "true" ]; then
            FLAGS="$FLAGS --enable-micro-win32"
          else
            FLAGS="$FLAGS --build-cli"
          fi
          if [ "${{ matrix.upx }}" == "true" ]; then
            FLAGS="$FLAGS --with-upx-pack"
          fi
          echo "SPC_BUILD_FLAGS=$FLAGS" >> $GITHUB_ENV

      - name: "Build PHP"
        working-directory: static-php-cli
        run: ./bin/spc build "${{ env.EXTENSIONS }}" ${{ env.SPC_BUILD_FLAGS }}

      - name: "Upload PHP cli"
        if: matrix.micro_win32 != true
        uses: actions/upload-artifact@v4
        with:
          name: php-cli-${{ env.PHP_VERSION }}-${{ matrix.os }}
          path: static-php-cli/buildroot/bin/php${{ matrix.os_family == 'windows' && '.exe' || '' }}

      - name: "Upload PHP micro"
        uses: actions/upload-artifact@v4
        with:
          name: php-micro-${{ env.PHP_VERSION }}-${{ matrix.os }}
          path: static-php-cli/buildroot/bin/micro.sfx

      - name: "Upload License files"
        uses: actions/upload-artifact@v4
        if: matrix.micro_win32 != true
        with:
          name: license-files-${{ env.PHP_VERSION }}-${{ matrix.os }}
          path: static-php-cli/buildroot/license/

      - name: "Upload Build metadata"
        if: matrix.micro_win32 != true
        uses: actions/upload-artifact@v4
        with:
          name: build-meta-${{ env.PHP_VERSION }}-${{ matrix.os }}
          path: |
            static-php-cli/buildroot/build-extensions.json
            static-php-cli/buildroot/build-libraries.json

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: "Prepare release assets"
        shell: bash
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            [ -d "$dir" ] || continue
            dirname=$(basename "$dir")
            for f in "$dir"/*; do
              [ -f "$f" ] || continue
              cp "$f" "release-assets/${dirname}_$(basename "$f")"
            done
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
