name: "Build PHP CLI/Micro for All Platforms"

on:
  workflow_dispatch:
    inputs:
      php-version:
        required: true
        description: PHP version to compile
        default: "8.5"
        type: choice
        options:
          - "8.5"
          - "8.4"
          - "8.3"
  push:
    tags:
      - "*"

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: "PHP ${{ github.event_name == 'workflow_dispatch' && inputs.php-version || '8.5' }} (${{ matrix.os }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-x86_64
            runs-on: ubuntu-22.04
            os_family: linux
            sapi: "cli,micro"
            upx: false
            extensions: "webview,bz2,ctype,curl,dom,ffi,filter,iconv,mbstring,zlib,openssl,phar,sockets,swow,tokenizer,xml,xmlreader,xmlwriter,zip"
          - os: linux-aarch64
            runs-on: ubuntu-22.04-arm
            os_family: linux
            sapi: "cli,micro"
            upx: false
            extensions: "webview,bz2,ctype,curl,dom,ffi,filter,iconv,mbstring,zlib,openssl,phar,sockets,swow,tokenizer,xml,xmlreader,xmlwriter,zip"
          - os: macos-x86_64
            runs-on: macos-15-intel
            os_family: macos
            sapi: "cli,micro"
            upx: false
            extensions: "webview,zlib,openssl,curl,swow,ctype,dom,filter,iconv,xml,xmlreader,xmlwriter,mbstring,pcntl,phar,posix,sockets,tokenizer,zip"
          - os: macos-aarch64
            runs-on: macos-15
            os_family: macos
            sapi: "cli,micro"
            upx: false
            extensions: "webview,zlib,openssl,curl,swow,ctype,dom,filter,iconv,xml,xmlreader,xmlwriter,mbstring,pcntl,phar,posix,sockets,tokenizer,zip"
          - os: windows-x86_64
            runs-on: windows-2022
            os_family: windows
            sapi: "cli,micro"
            micro_win32: false
            upx: true
            extensions: "webview,bz2,ctype,zlib,openssl,curl,iconv,xml,dom,ffi,filter,mbstring,phar,sockets,swow,tokenizer,xmlreader,xmlwriter,zip"
          - os: windows-x86_64-no-console
            runs-on: windows-2022
            os_family: windows
            sapi: "micro"
            micro_win32: true
            upx: true
            extensions: "webview,bz2,ctype,zlib,openssl,curl,iconv,xml,dom,ffi,filter,mbstring,phar,sockets,swow,tokenizer,xmlreader,xmlwriter,zip"
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: pecl
          extensions: curl, openssl, mbstring
          ini-values: memory_limit=-1

      - name: "Clone static-php-cli"
        run: |
          git clone --depth 1 https://github.com/crazywhalecc/static-php-cli.git
          cd static-php-cli
          composer install --no-dev --no-interaction --prefer-dist

      - name: "Configure StaticPHP v3"
        shell: bash
        working-directory: static-php-cli
        run: |
          DOWNLOAD_PARALLEL=10
          if [ "${{ matrix.os_family }}" = "windows" ]; then
            DOWNLOAD_PARALLEL=1
          fi

          ../scripts/configure-spc-v3-webview.sh
          ../scripts/configure-spc-v3-craft.sh \
            --php-version "${{ github.event_name == 'workflow_dispatch' && inputs.php-version || '8.5' }}" \
            --extensions "${{ matrix.extensions }}" \
            --sapi "${{ matrix.sapi }}" \
            --debug false \
            --enable-micro-win32 "${{ matrix.micro_win32 }}" \
            --with-upx-pack "${{ matrix.upx }}" \
            --download-parallel "${DOWNLOAD_PARALLEL}"

      - name: "Generate cache key"
        shell: bash
        run: echo "EXTENSIONS_KEY=$(echo '${{ matrix.extensions }}' | tr ',' '-')" >> "$GITHUB_ENV"

      - id: cache-download
        name: "Cache downloaded source"
        uses: actions/cache@v4
        with:
          path: static-php-cli/downloads
          key: php-dependencies-v3-${{ matrix.os }}-${{ github.event_name == 'workflow_dispatch' && inputs.php-version || '8.5' }}-${{ env.EXTENSIONS_KEY }}

      - name: "Setup (Linux)"
        if: matrix.os_family == 'linux'
        working-directory: static-php-cli
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

          EXT_WEBVIEW_DEPS_PC_DIR="$(pwd)/ext_webview_deps_pc_dir"
          ../scripts/copy-pkgconfig.sh --dir "${EXT_WEBVIEW_DEPS_PC_DIR}"

          echo "SPC_TARGET=native-native" >> $GITHUB_ENV

          if [[ "${{ matrix.extensions }}" == *"webview"* ]]; then
            echo "SPC_EXTRA_LIBS=$(pkg-config --libs gtk+-3.0 webkit2gtk-4.1)" >> $GITHUB_ENV
            echo "PKG_CONFIG_PATH=${EXT_WEBVIEW_DEPS_PC_DIR}" >> $GITHUB_ENV
          fi

      - name: "Autofix build environment (Windows)"
        if: matrix.os_family == 'windows'
        working-directory: static-php-cli
        run: ./bin/spc doctor --auto-fix

      - name: "Craft build"
        working-directory: static-php-cli
        run: ./bin/spc craft craft.yml

      - name: "Upload PHP cli"
        if: matrix.micro_win32 != true
        uses: actions/upload-artifact@v4
        with:
          name: php-cli-${{ github.event_name == 'workflow_dispatch' && inputs.php-version || '8.5' }}-${{ matrix.os }}
          path: static-php-cli/buildroot/bin/php${{ matrix.os_family == 'windows' && '.exe' || '' }}

      - name: "Upload PHP micro"
        uses: actions/upload-artifact@v4
        with:
          name: php-micro-${{ github.event_name == 'workflow_dispatch' && inputs.php-version || '8.5' }}-${{ matrix.os }}
          path: static-php-cli/buildroot/bin/micro.sfx

      - name: "Upload License files"
        uses: actions/upload-artifact@v4
        if: matrix.micro_win32 != true
        with:
          name: license-files-${{ github.event_name == 'workflow_dispatch' && inputs.php-version || '8.5' }}-${{ matrix.os }}
          path: static-php-cli/buildroot/license/

      - name: "Upload Build metadata"
        if: matrix.micro_win32 != true
        uses: actions/upload-artifact@v4
        with:
          name: build-meta-${{ github.event_name == 'workflow_dispatch' && inputs.php-version || '8.5' }}-${{ matrix.os }}
          path: static-php-cli/buildroot/.build.json

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: "Prepare release assets"
        shell: bash
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            [ -d "$dir" ] || continue
            dirname=$(basename "$dir")

            if [[ "$dirname" == *windows* ]]; then
              (cd "$dir" && zip -r "../../release-assets/${dirname}.zip" .)
            else
              tar -czf "release-assets/${dirname}.tar.gz" -C "$dir" .
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
